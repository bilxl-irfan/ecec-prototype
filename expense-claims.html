<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Claims - ECEC</title>
    <link rel="icon" type="image/png" href="assets/ecec-logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="expense.css">
</head>
<body class="admin-main">

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="assets/ecec-logo.png" alt="ECEC Icon" class="nav-icon">
            <span>ECEC</span>
        </a>
        <div class="nav-links">
            <a href="admin_uplink.html">← Back to Dashboard</a>
        </div>
    </nav>

    <main class="contact-main">
        <header class="contact-hero">
            <h1>Initialize <span class="highlight">Claim</span></h1>
            <p>Submit digital receipts for project components, supplies, or approved event costs. Payload must include valid PDF or Image data.</p>
        </header>

        <div class="contact-grid" style="grid-template-columns: 1fr; max-width: 700px;">
            <section class="form-container">
                <div class="panel-header">
                    <span class="panel-title">// FINANCIAL_TRANSFORM</span>
                    <div class="status-light" style="background: #00FF88; box-shadow: 0 0 10px #00FF88;"></div>
                </div>

                <div id="success-screen" class="terminal-success" style="display: none;">
                    <div class="success-content">
                        <span class="success-icon">✓</span>
                        <h3>CLAIM LOGGED</h3>
                        <p>Financial data encrypted and sent to HQ for verification.</p>
                        <a href="admin_uplink.html" class="reset-btn">Return to Dashboard</a>
                    </div>
                </div>

                <form id="expense-form" action="https://formspree.io/f/xaqpykgb" method="POST" enctype="multipart/form-data" class="uplink-form">
                    <div class="input-group">
                        <label>OPERATOR NAME</label>
                        <input type="text" name="name" placeholder="Name of claimant" required>
                    </div>
                    
                    <div class="input-group">
                        <label>REIMBURSEMENT TOTAL ($ CAD)</label>
                        <input type="number" step="0.01" name="amount" placeholder="0.00" required>
                    </div>

                    <div class="input-group">
                        <label>ALLOCATION (DESIGN SQUAD / EVENT)</label>
                        <select name="allocation">
                            <option>ASIC Design Squad</option>
                            <option>Neurotech Collective</option>
                            <option>XR Systems Squad</option>
                            <option>AM System Project</option>
                            <option>NANO Research Group</option>
                            <option>General Operations</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label>RECEIPT DATA PAYLOAD (IMAGE/PDF)</label>
                        <input type="file" name="upload" accept="image/*,.pdf" required style="padding: 0.8rem; font-size: 0.8rem;">
                    </div>

                    <div class="input-group">
                        <label>EXPENDITURE JUSTIFICATION</label>
                        <textarea name="message" rows="3" placeholder="Briefly describe what was purchased..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span>SEND FINANCIAL DATA</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                    </button>
                </form>
            </section>
        </div>
    </main>

    <script>
        const expenseForm = document.getElementById('expense-form');
        const successScreen = document.getElementById('success-screen');
        const submitBtn = document.getElementById('submit-btn');

        expenseForm.addEventListener('submit', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.querySelector('span').innerText = "UPLOADING...";
            
            const formData = new FormData(this);
            
            fetch(this.action, {
                method: 'POST',
                body: formData,
                headers: {'Accept': 'application/json'}
            }).then(response => {
                if (response.ok) {
                    expenseForm.style.display = 'none';
                    successScreen.style.display = 'flex';
                } else {
                    alert("Transmission Error. Please retry.");
                    submitBtn.disabled = false;
                    submitBtn.querySelector('span').innerText = "RETRY UPLINK";
                }
            }).catch(error => {
                alert("Network Fault.");
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
